name: Generate metrics + contribution assests
on:
  schedule: # execute every 168 hours (1 week)
    - cron: "0 0 * * 0" # Run every Sunday at midnight (0:00)
  workflow_dispatch:

concurrency:
  group: metrics-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Sutil/snk@master
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: assets/github-contribution-grid-snake2.svg
          snake_color: 'green'

      - name: 📊 Generate GitHub Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          # Options
          user: avivajpeyi
          template: classic
          base: activity, repositories, metadata
          base_indepth: yes
          config_octicon: yes
          config_timezone: Australia/Melbourne
          config_padding: 10%
          plugin_lines: yes
          plugin_lines_history_limit: 8
          plugin_lines_repositories_limit: 40
          plugin_lines_sections: base
          plugin_habits_languages_threshold: 0%
          config_display: columns

      - name: 🚀 Fetch GitHub Metrics as JSON
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: avivajpeyi
          base: header, activity, community, repositories, metadata
          config_output: json
          plugin_languages: yes
          plugin_languages_limit: 8
          filename: assets/data/metrics.json
          committer_message: "data: update metrics.json [skip ci]"
