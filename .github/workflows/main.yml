name: Generate metrics + contribution assests
on:
  schedule: # execute every 168 hours (1 week)
    - cron: "0 0 * * 0" # Run every Sunday at midnight (0:00)
  workflow_dispatch:

concurrency:
  group: contribution-calendar-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate contribution JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: avivajpeyi
        run: node scripts/fetch-contributions.mjs

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: update contributions.json [skip ci]"
          file_pattern: "assets/data/contributions.json"

      - uses: Sutil/snk@master
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          svg_out_path: assets/github-contribution-grid-snake2.svg
          snake_color: 'green'